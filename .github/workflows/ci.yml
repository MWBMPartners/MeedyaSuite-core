name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo build --workspace --all-features
        run: cargo build --workspace --all-features --locked

      - name: cargo test --workspace
        run: cargo test --workspace --all-features --locked

      # Clippy is informational for now: the existing tree has pre-existing
      # warnings (notably in meedya-codecs/src/container.rs) that are
      # unrelated to in-flight work. Promote to `-D warnings` once those
      # are cleaned up.
      - name: cargo clippy (informational)
        continue-on-error: true
        run: cargo clippy --workspace --all-targets --all-features -- -W clippy::all

  frontend:
    name: Frontend (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # MeedyaSuite-core is a pure-Rust workspace. The `Frontend` check
      # exists to satisfy a branch-protection requirement inherited from
      # the org template; there is no frontend code to build here.
      # Replace this with a real frontend build if/when one is added.
      - name: No frontend in this repo
        run: echo "MeedyaSuite-core has no frontend; nothing to build."
