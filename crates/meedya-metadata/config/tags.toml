# MeedyaSuite-core — Default Tag Registry
#
# Config-driven metadata tag definitions. Adding new tags requires only
# editing this file — no Rust code changes needed.
#
# Structure:
#   [scope.tag_id]
#   json_path   = "dot.separated.path"   # into API JSON response
#   value_type  = "string|bool|u32|u64|array|first_of_array"
#   atoms = [
#       { namespace = "itunes|meedya|<custom>", name = "AtomName" },
#   ]
#
# Namespace shortcuts:
#   "itunes" → "com.apple.iTunes"
#   "meedya" → "MeedyaMeta"

# ─── Album-scope tags ────────────────────────────────────────────────

[album.upc]
json_path = "attributes.upc"
value_type = "string"
atoms = [
    { namespace = "itunes", name = "UPC" },
    { namespace = "itunes", name = "Barcode" },
    { namespace = "meedya", name = "AppleUPC" },
]

